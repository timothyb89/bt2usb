version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Group all patch/minor updates together to reduce PR noise
    groups:
      embassy:
        patterns:
          - "embassy-*"
      trouble:
        patterns:
          - "trouble-*"
          - "bt-hci"
      patch-updates:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

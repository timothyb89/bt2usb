name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  DEFMT_LOG: info

jobs:
  firmware:
    name: Build Firmware UF2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        run: rustup show

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Cache elf2uf2-rs
        id: cache-elf2uf2
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/elf2uf2-rs
          key: elf2uf2-rs-${{ runner.os }}

      - name: Install elf2uf2-rs
        if: steps.cache-elf2uf2.outputs.cache-hit != 'true'
        run: cargo install elf2uf2-rs --locked

      - name: Download CYW43 firmware
        run: just download-firmware

      - name: Build UF2
        run: just build-uf2 release

      - name: Rename artifact
        run: mv bt2usb/bt2usb.uf2 bt2usb-${{ github.ref_name }}.uf2

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"

  cli-windows:
    name: Build CLI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build
        run: cargo build --package bt2usb-cli --release

      - name: Rename artifact
        run: cp target/release/bt2usb-cli.exe bt2usb-cli-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe

      - uses: actions/upload-artifact@v4
        with:
          name: cli-windows
          path: "*.exe"

  cli-linux:
    name: Build CLI (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --package bt2usb-cli --target x86_64-unknown-linux-musl --release

      - name: Rename artifact
        run: cp target/x86_64-unknown-linux-musl/release/bt2usb-cli bt2usb-cli-${{ github.ref_name }}-x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux
          path: "bt2usb-cli-*"

  publish:
    name: Create GitHub Release
    needs: [firmware, cli-windows, cli-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
